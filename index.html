const sb=async(table,method="GET",body=null,query="")=>{
  const q=query.replace(/ /g,"%20");
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${q}`,{method,headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:method==="POST"?"return=representation":method==="PATCH"?"return=representation":""},body:body?JSON.stringify(body):null});
  if(method==="DELETE"&&res.ok)return null;
  const text=await res.text();
  const data=text?JSON.parse(text):null;
  if(!res.ok)throw new Error(data?.message||JSON.stringify(data)||"Error");
  return data;
};
const genNomor=async(prefix)=>{
  const now=new Date();
  const yy=String(now.getFullYear()).slice(2);
  const mm=String(now.getMonth()+1).padStart(2,"0");
  const tahun=now.getFullYear();
  const bulan=now.getMonth()+1;
  const existing=await sb("nomor_urut","GET",null,`?prefix=eq.${prefix}&tahun=eq.${tahun}&bulan=eq.${bulan}`);
  let urut=0;
  if(existing&&existing.length>0){urut=(existing[0].urut||0)+1;await sb(`nomor_urut?id=eq.${existing[0].id}`,"PATCH",{urut});}
  else{urut=1;await sb("nomor_urut","POST",{prefix,tahun,bulan,urut});}
  if(prefix==="T")return`T${yy}${mm}${String(urut).padStart(3,"0")}`;
  if(prefix==="BCA")return`BCA${yy}${mm}${String(urut).padStart(3,"0")}`;
  return`${prefix}${yy}${mm}${String(urut).padStart(4,"0")}`;
};

function ProdukSearch({produkList,onSelect,placeholder="Cari kode/nama produk..."}){
  const[q,setQ]=useState("");
  const[show,setShow]=useState(false);
  const ref=useRef();
  const filtered=q.length>0?produkList.filter(p=>p.nama.toLowerCase().includes(q.toLowerCase())||p.kode.toLowerCase().includes(q.toLowerCase())).slice(0,8):[];
  useEffect(()=>{const handler=(e)=>{if(ref.current&&!ref.current.contains(e.target))setShow(false);};document.addEventListener("mousedown",handler);return()=>document.removeEventListener("mousedown",handler);},[]);
  return(
    <div ref={ref} style={{position:"relative"}}>
      <input value={q} onChange={e=>{setQ(e.target.value);setShow(true);}} onFocus={()=>setShow(true)} placeholder={placeholder}
        style={{background:"#0f1117",border:"1px solid #1e2535",borderRadius:8,padding:"8px 11px",color:"#e2e8f0",fontSize:13,outline:"none",width:"100%"}}/>
      {show&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#161b27",border:"1px solid #1e2535",borderRadius:8,zIndex:999,maxHeight:200,overflowY:"auto"}}>
          {filtered.map(p=>(
            <div key={p.id} onClick={()=>{onSelect(p);setQ(p.nama);setShow(false);}} style={{padding:"8px 12px",cursor:"pointer",borderBottom:"1px solid #1e2535",fontSize:12}}
              onMouseEnter={e=>e.target.style.background="#1e2535"} onMouseLeave={e=>e.target.style.background="transparent"}>
              <span style={{color:"#60a5fa"}}>{p.kode}</span> — {p.nama} <span style={{color:"#64748b"}}>({fmt(p.harga_jual)})</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Settings({showToast,setting,setSetting}){
  const[form,setForm]=useState({...setting});
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const simpan=async()=>{
    try{
      if(setting.id){await sb(`pengaturan?id=eq.${setting.id}`,"PATCH",form);}
      else{await sb("pengaturan","POST",form);}
      setSetting({...setting,...form});
      showToast("Pengaturan disimpan!");
    }catch(e){showToast(e.message,"error");}
  };
  return(
    <div>
      <PageTitle title="⚙️ Pengaturan" subtitle="Identitas perusahaan untuk print dokumen"/>

  const[namaAkun,setNamaAkun]=useState("");
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const load=async()=>{try{const[a,t]=await Promise.all([sb("akun_kas","GET",null,"?select=*&order=nama"),sb("transaksi_kas","GET",null,"?select=*,akun_kas(nama)&order=created_at.desc&limit=100")]);setAkun(a||[]);setTransaksi(t||[]);if(a?.length&&!form.akun_id)setForm(f=>({...f,akun_id:a[0].id}));}catch(e){showToast("Gagal: "+e.message,"error");}setLoading(false);};
  useEffect(()=>{load();},[]);
  const simpan=async()=>{
    if(!form.akun_id||!form.jumlah)return showToast("Isi semua field!","error");
    try{
      let nomor="";
      if(form.tipe==="masuk"){const prefix=form.metode==="bca"?"BCA":"T";nomor=await genNomor(prefix);}
      await sb("transaksi_kas","POST",{akun_id:form.akun_id,tipe:form.tipe,jumlah:parseFloat(form.jumlah),keterangan:form.keterangan,tanggal:form.tanggal,metode:form.metode,nomor_terima:nomor||null});
      const delta=form.tipe==="masuk"?parseFloat(form.jumlah):-parseFloat(form.jumlah);
      const a=akun.find(x=>x.id===form.akun_id);
      await sb(`akun_kas?id=eq.${form.akun_id}`,"PATCH",{saldo:(a?.saldo||0)+delta});
      showToast(`Berhasil! ${nomor?"No: "+nomor:""}`);setShowForm(false);F("jumlah","");F("keterangan","");load();
    }catch(e){showToast(e.message,"error");}
  };
  const hapus=async(t)=>{if(!confirm("Hapus transaksi ini?"))return;try{const delta=t.tipe==="masuk"?-t.jumlah:t.jumlah;const a=akun.find(x=>x.id===t.akun_id);if(a)await sb(`akun_kas?id=eq.${t.akun_id}`,"PATCH",{saldo:(a.saldo||0)+delta});await sb(`transaksi_kas?id=eq.${t.id}`,"DELETE");showToast("Dihapus!");load();}catch(e){showToast(e.message,"error");}};
  const tambahAkun=async()=>{if(!namaAkun)return showToast("Isi nama!","error");try{await sb("akun_kas","POST",{nama:namaAkun,saldo:0});showToast("Akun ditambahkan!");setNamaAkun("");setShowAkunForm(false);load();}catch(e){showToast(e.message,"error");}};
  if(loading)return<Loading/>;
  return(
    <div>
      <PageTitle title="Kas & Bank" subtitle="Kelola arus kas masuk dan keluar"/>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>{akun.map(a=><Card key={a.id} style={{borderTop:"3px solid #22c55e",minWidth:130}}><div style={{color:"#64748b",fontSize:11}}>{a.nama}</div><div style={{color:"#22c55e",fontWeight:700,fontSize:16}}>{fmt(a.saldo)}</div></Card>)}</div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}><Btn onClick={()=>setShowForm(!showForm)}>+ Transaksi</Btn><Btn onClick={()=>setShowAkunForm(!showAkunForm)} color="#475569">+ Akun</Btn></div>
      {showAkunForm&&<Card style={{marginBottom:12}}><div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}><Inp label="Nama Akun" value={namaAkun} onChange={setNamaAkun} style={{flex:1,minWidth:150}}/><Btn onClick={tambahAkun}>Simpan</Btn><Btn onClick={()=>setShowAkunForm(false)} color="#475569">Batal</Btn></div></Card>}
      {showForm&&<Card style={{marginBottom:16}}>
        <h3 style={{margin:"0 0 12px",fontSize:14}}>Tambah Transaksi</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9}}>
          <Sel label="Akun" value={form.akun_id} onChange={v=>F("akun_id",v)} options={akun.map(a=>({value:a.id,label:a.nama}))}/>
          <Sel label="Tipe" value={form.tipe} onChange={v=>F("tipe",v)} options={[{value:"masuk",label:"▲ Masuk"},{value:"keluar",label:"▼ Keluar"}]}/>
          {form.tipe==="masuk"&&<Sel label="Metode" value={form.metode} onChange={v=>F("metode",v)} options={[{value:"tunai",label:"Tunai"},{value:"bca",label:"Bank BCA"}]}/>}
          <Inp label="Jumlah" value={form.jumlah} onChange={v=>F("jumlah",v)} type="number"/>
          <Inp label="Tanggal" value={form.tanggal} onChange={v=>F("tanggal",v)} type="date"/>
          <Inp label="Keterangan" value={form.keterangan} onChange={v=>F("keterangan",v)}/>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={simpan}>Simpan</Btn><Btn onClick={()=>setShowForm(false)} color="#475569">Batal</Btn></div>
      </Card>}
      <Card><Tbl headers={[{l:"Tanggal"},{l:"Akun"},{l:"Tipe"},{l:"Keterangan"},{l:"Jumlah",r:true},{l:""}]} rows={transaksi.map(t=>[<span style={{color:"#64748b"}}>{fmtDate(t.tanggal)}</span>,t.akun_kas?.nama||"-",<Badge label={t.tipe==="masuk"?"▲ Masuk":"▼ Keluar"} bg={t.tipe==="masuk"?"#14532d":"#7f1d1d"} color={t.tipe==="masuk"?"#4ade80":"#f87171"}/>,<span style={{color:"#94a3b8"}}>{t.keterangan||"-"}</span>,<span style={{fontWeight:600,color:t.tipe==="masuk"?"#22c55e":"#f87171"}}>{fmt(t.jumlah)}</span>,<Btn onClick={()=>hapus(t)} color="#7f1d1d" small>Hapus</Btn>])} empty="Belum ada transaksi"/></Card>
    </div>
  );
}
