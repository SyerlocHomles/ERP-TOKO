const sb=async(table,method="GET",body=null,query="")=>{
  const q=query.replace(/ /g,"%20");
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${q}`,{method,headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:method==="POST"?"return=representation":method==="PATCH"?"return=representation":""},body:body?JSON.stringify(body):null});
  if(method==="DELETE"&&res.ok)return null;
  const text=await res.text();
  const data=text?JSON.parse(text):null;
  if(!res.ok)throw new Error(data?.message||JSON.stringify(data)||"Error");
  return data;
};
const genNomor=async(prefix)=>{
  const now=new Date();
  const yy=String(now.getFullYear()).slice(2);
  const mm=String(now.getMonth()+1).padStart(2,"0");
  const tahun=now.getFullYear();
  const bulan=now.getMonth()+1;
  const existing=await sb("nomor_urut","GET",null,`?prefix=eq.${prefix}&tahun=eq.${tahun}&bulan=eq.${bulan}`);
  let urut=0;
  if(existing&&existing.length>0){urut=(existing[0].urut||0)+1;await sb(`nomor_urut?id=eq.${existing[0].id}`,"PATCH",{urut});}
  else{urut=1;await sb("nomor_urut","POST",{prefix,tahun,bulan,urut});}
  if(prefix==="T")return`T${yy}${mm}${String(urut).padStart(3,"0")}`;
  if(prefix==="BCA")return`BCA${yy}${mm}${String(urut).padStart(3,"0")}`;
  return`${prefix}${yy}${mm}${String(urut).padStart(4,"0")}`;
};

const BarChart=({data,color="#3b82f6",label=""})=>{const max=Math.max(...data.map(d=>d.val),1);return<div>{label&&<div style={{color:"#64748b",fontSize:11,marginBottom:8,fontWeight:600}}>{label}</div>}<div style={{display:"flex",alignItems:"flex-end",gap:3,height:70}}>{data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><div style={{width:"100%",background:color,borderRadius:"3px 3px 0 0",height:`${(d.val/max)*58}px`,minHeight:d.val>0?3:0}}/><div style={{fontSize:9,color:"#475569"}}>{d.label}</div></div>)}</div></div>;};

      </Card>}

    </div>
  );
}
function Pembelian({showToast}){
  const[list,setList]=useState([]);
  const[produk,setProduk]=useState([]);
  const[supList,setSupList]=useState([]);
  const[loading,setLoading]=useState(true);
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({supplier_id:"",supplier:"",tanggal:today(),status:"lunas",jatuh_tempo:""});
  const[items,setItems]=useState([]);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const load=async()=>{try{const[l,p,s]=await Promise.all([sb("pembelian","GET",null,"?select=*&order=created_at.desc&limit=100"),sb("produk","GET",null,"?select=*&order=nama"),sb("supplier","GET",null,"?select=*&order=nama")]);setList(l||[]);setProduk(p||[]);setSupList(s||[]);if(p?.length)setItems([{produk_id:p[0].id,nama_produk:p[0].nama,qty:1,harga:p[0].harga_beli,subtotal:p[0].harga_beli}]);}catch(e){showToast("Gagal: "+e.message,"error");}setLoading(false);};
  useEffect(()=>{load();},[]);
  const updItem=(i,k,v)=>{const ni=[...items];ni[i]={...ni[i],[k]:v};if(k==="produk_id"){const p=produk.find(x=>x.id===v);if(p){ni[i].nama_produk=p.nama;ni[i].harga=p.harga_beli;}}ni[i].subtotal=(parseFloat(ni[i].qty)||0)*(parseFloat(ni[i].harga)||0);setItems(ni);};
  const total=items.reduce((a,b)=>a+(b.subtotal||0),0);
  const simpan=async()=>{
    if(!items.length)return showToast("Tambahkan item!","error");
    try{const nomor_po=await genNomor("PO");const sup=supList.find(s=>s.id===form.supplier_id);const namaS=sup?.nama||form.supplier||"-";
    const[beli]=await sb("pembelian","POST",{...form,nomor_po,total,supplier:namaS});
    await sb("pembelian_detail","POST",items.map(i=>({...i,pembelian_id:beli.id,qty:parseFloat(i.qty),harga:parseFloat(i.harga),subtotal:parseFloat(i.subtotal)})));
    for(const item of items){const p=produk.find(x=>x.id===item.produk_id);if(p)await sb(`produk?id=eq.${item.produk_id}`,"PATCH",{stok:(p.stok||0)+parseFloat(item.qty)});}
    if(form.status==="hutang")await sb("hutang","POST",{pembelian_id:beli.id,supplier:namaS,total,terbayar:0,sisa:total,status:"belum lunas",jatuh_tempo:form.jatuh_tempo||null});
    showToast(`PO ${nomor_po} berhasil!`);setShowForm(false);setForm({supplier_id:"",supplier:"",tanggal:today(),status:"lunas",jatuh_tempo:""});load();}catch(e){showToast(e.message,"error");}
  };
  if(loading)return<Loading/>;
  return(
    <div>
      <PageTitle title="Pembelian" subtitle="Catat pembelian barang dari supplier"/>
      <Btn onClick={()=>setShowForm(!showForm)} style={{marginBottom:16}}>+ PO Baru</Btn>
      {showForm&&<Card style={{marginBottom:16}}>
        <h3 style={{margin:"0 0 12px",fontSize:14}}>Purchase Order Baru</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:9,marginBottom:12}}>
          <Sel label="Supplier" value={form.supplier_id} onChange={v=>F("supplier_id",v)} options={[{value:"",label:"-- Pilih --"},...supList.map(s=>({value:s.id,label:s.nama}))]}/>
          <Inp label="Atau ketik nama" value={form.supplier} onChange={v=>F("supplier",v)} placeholder="Nama bebas"/>
          <Inp label="Tanggal" value={form.tanggal} onChange={v=>F("tanggal",v)} type="date"/>
          <Sel label="Status" value={form.status} onChange={v=>F("status",v)} options={[{value:"lunas",label:"Lunas"},{value:"hutang",label:"Hutang"}]}/>
          {form.status==="hutang"&&<Inp label="Jatuh Tempo" value={form.jatuh_tempo} onChange={v=>F("jatuh_tempo",v)} type="date"/>}
        </div>
        {items.map((item,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 55px 100px auto 26px",gap:6,marginBottom:6,alignItems:"flex-end"}}>
            <Sel label={i===0?"Produk":""} value={item.produk_id} onChange={v=>updItem(i,"produk_id",v)} options={produk.map(p=>({value:p.id,label:p.nama}))}/>
            <Inp label={i===0?"Qty":""} value={item.qty} onChange={v=>updItem(i,"qty",v)} type="number"/>
            <Inp label={i===0?"Harga Beli":""} value={item.harga} onChange={v=>updItem(i,"harga",v)} type="number"/>
            <div>{i===0&&<label style={{fontSize:11,color:"#64748b",fontWeight:600,display:"block",marginBottom:4}}>Sub</label>}<div style={{padding:"8px 0",fontWeight:600,color:"#f59e0b",fontSize:12}}>{fmt(item.subtotal)}</div></div>
            {items.length>1&&<button onClick={()=>setItems(items.filter((_,idx)=>idx!==i))} style={{background:"#7f1d1d",border:"none",color:"#f87171",borderRadius:6,cursor:"pointer",padding:"6px"}}>✕</button>}
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,flexWrap:"wrap",gap:8}}>
          <Btn onClick={()=>{const p=produk[0];setItems([...items,{produk_id:p?.id||"",nama_produk:p?.nama||"",qty:1,harga:p?.harga_beli||0,subtotal:p?.harga_beli||0}]);}} color="#1e3a5f" small>+ Item</Btn>
          <div style={{fontWeight:700,fontSize:15,color:"#f59e0b"}}>Total: {fmt(total)}</div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={simpan}>Simpan PO</Btn><Btn onClick={()=>setShowForm(false)} color="#475569">Batal</Btn></div>
      </Card>}
      <Card><Tbl headers={[{l:"No. PO"},{l:"Supplier"},{l:"Tanggal"},{l:"Total",r:true},{l:"Status"}]} rows={list.map(r=>[<span style={{color:"#60a5fa"}}>{r.nomor_po}</span>,r.supplier||"-",<span style={{color:"#64748b"}}>{fmtDate(r.tanggal)}</span>,<span style={{color:"#f59e0b",fontWeight:600}}>{fmt(r.total)}</span>,statusBadge(r.status)])} empty="Belum ada pembelian"/></Card>
    </div>
  );
}
function BayarRow({r,onBayar,warnColor}){
  const[open,setOpen]=useState(false);
  const[jml,setJml]=useState("");
  return r.status!=="lunas"?open?<div style={{display:"flex",gap:5,alignItems:"center"}}><input value={jml} onChange={e=>setJml(e.target.value)} type="number" placeholder="Jumlah" style={{background:"#0f1117",border:"1px solid #1e2535",borderRadius:6,padding:"4px 7px",color:"#e2e8f0",width:85,fontSize:12}}/><Btn onClick={()=>onBayar(r,parseFloat(jml),()=>{setOpen(false);setJml("");})} small>OK</Btn><Btn onClick={()=>setOpen(false)} color="#475569" small>✕</Btn></div>:<Btn onClick={()=>setOpen(true)} color={warnColor} small>Bayar</Btn>:<span style={{color:"#22c55e",fontSize:11}}>✅ Lunas</span>;
}
function PiutangPage({showToast}){
  const[list,setList]=useState([]);
  const[loading,setLoading]=useState(true);
  const load=async()=>{try{setList(await sb("piutang","GET",null,"?select=*&order=created_at.desc")||[]);}catch(e){showToast("Gagal: "+e.message,"error");}setLoading(false);};
  useEffect(()=>{load();},[]);
  const bayar=async(r,jml,cb)=>{if(!jml||jml<=0)return showToast("Jumlah tidak valid!","error");const newT=(r.terbayar||0)+jml;const newS=r.total-newT;const status=newS<=0?"lunas":"sebagian";try{await sb(`piutang?id=eq.${r.id}`,"PATCH",{terbayar:newT,sisa:Math.max(0,newS),status});showToast("Berhasil!");cb();load();}catch(e){showToast(e.message,"error");}};
  if(loading)return<Loading/>;
  const total=list.reduce((a,b)=>a+(b.sisa||0),0);
  return(
    <div>
      <PageTitle title="Piutang" subtitle="Tagihan dari pelanggan belum dibayar"/>
      <Card style={{marginBottom:12,borderTop:"3px solid #a78bfa"}}><div style={{color:"#64748b",fontSize:11}}>Total Piutang Aktif</div><div style={{color:"#a78bfa",fontWeight:700,fontSize:18}}>{fmt(total)}</div></Card>
      <Card><Tbl headers={[{l:"Pelanggan"},{l:"Total",r:true},{l:"Terbayar",r:true},{l:"Sisa",r:true},{l:"Jatuh Tempo"},{l:"Status"},{l:""}]} rows={list.map(r=>[r.pelanggan||"-",fmt(r.total),<span style={{color:"#22c55e"}}>{fmt(r.terbayar)}</span>,<span style={{color:"#f87171",fontWeight:600}}>{fmt(r.sisa)}</span>,<span style={{color:r.jatuh_tempo&&new Date(r.jatuh_tempo)<new Date()&&r.status!=="lunas"?"#f87171":"#64748b"}}>{fmtDate(r.jatuh_tempo)}</span>,statusBadge(r.status),<BayarRow r={r} onBayar={bayar} warnColor="#166534"/>])} empty="Belum ada piutang"/></Card>
    </div>
  );
}
